    SENTRY_RATELIMITER = "sentry.ratelimits.redis.RedisRateLimiter"
  
    ##################
    # Update Buffers #
    ##################
  
    # Buffers (combined with queueing) act as an intermediate layer between the
    # database and the storage API. They will greatly improve efficiency on large
    # numbers of the same events being sent to the API in a short amount of time.
    # (read: if you send any kind of real data to Sentry, you should enable buffers)
  
    SENTRY_BUFFER = "sentry.buffer.redis.RedisBuffer"
  
    ##########
    # Quotas #
    ##########
  
    # Quotas allow you to rate limit individual projects or the Sentry install as
    # a whole.
  
    SENTRY_QUOTAS = "sentry.quotas.redis.RedisQuota"
  
    ########
    # TSDB #
    ########
  
    # The TSDB is used for building charts as well as making things like per-rate
    # alerts possible.
  
    SENTRY_TSDB = "sentry.tsdb.redissnuba.RedisSnubaTSDB"
  
    #########
    # SNUBA #
    #########
  
    SENTRY_SEARCH = "sentry.search.snuba.EventsDatasetSnubaSearchBackend"
    SENTRY_SEARCH_OPTIONS = {}
    SENTRY_TAGSTORE_OPTIONS = {}
  
    ###########
    # Digests #
    ###########
  
    # The digest backend powers notification summaries.
  
    SENTRY_DIGESTS = "sentry.digests.backends.redis.RedisBackend"
  
    ###################
    # Metrics Backend #
    ###################
  
    SENTRY_RELEASE_HEALTH = "sentry.release_health.metrics.MetricsReleaseHealthBackend"
    SENTRY_RELEASE_MONITOR = "sentry.release_health.release_monitor.metrics.MetricReleaseMonitorBackend"
  
    ##############
    # Web Server #
    ##############
    SENTRY_WEB_HOST = "0.0.0.0"
  
  
    SENTRY_WEB_PORT = 9000
    SENTRY_PUBLIC = False
    SENTRY_WEB_OPTIONS = {
        "http": "%s:%s" % (SENTRY_WEB_HOST, SENTRY_WEB_PORT),
        "protocol": "uwsgi",
        # This is needed to prevent https://git.io/fj7Lw
        "uwsgi-socket": None,
        # Keep this between 15s-75s as that's what Relay supports
        "http-keepalive": 15,
        "http-chunked-input": True,
        # the number of web workers
        'workers': 3,
        # Turn off memory reporting
        "memory-report": False,
        # Some stuff so uwsgi will cycle workers sensibly
        'max-requests': 100000,
        'max-requests-delta': 500,
        'max-worker-lifetime': 86400,
        # Duplicate options from sentry default just so we don't get
        # bit by sentry changing a default value that we depend on.
        'thunder-lock': True,
        'log-x-forwarded-for': False,
        'buffer-size': 32768,
        'limit-post': 209715200,
        'disable-logging': True,
        'reload-on-rss': 600,
        'ignore-sigpipe': True,
        'ignore-write-errors': True,
        'disable-write-exception': True,
    }
  
    ###########
    # SSL/TLS #
    ###########
  
    # If you're using a reverse SSL proxy, you should enable the X-Forwarded-Proto
    # header and enable the settings below
  
    # SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')
    # SESSION_COOKIE_SECURE = True
    # CSRF_COOKIE_SECURE = True
    # SOCIAL_AUTH_REDIRECT_IS_HTTPS = True
  
    # End of SSL/TLS settings
  
    ############
    # Features #
    ############
  
  
    SENTRY_FEATURES = {
      "auth:register": True
    }
    SENTRY_FEATURES["projects:sample-events"] = False
    SENTRY_FEATURES.update(
        {
            feature: True
            for feature in (
                "organizations:discover",
                "organizations:global-views",
                "organizations:issue-views",
                "organizations:incidents",
                "organizations:integrations-issue-basic",
                "organizations:integrations-issue-sync",
                "organizations:invite-members",
                "organizations:sso-basic",
                "organizations:sso-saml2",
                "organizations:advanced-search",
                "organizations:issue-platform",
                "organizations:monitors",
                "organizations:dashboards-mep",
                "organizations:mep-rollout-flag",
                "organizations:dashboards-rh-widget",
                "organizations:dynamic-sampling",
                "projects:custom-inbound-filters",
                "projects:data-forwarding",
                "projects:discard-groups",
                "projects:plugins",
                "projects:rate-limits",
                "projects:servicehooks",
            )
            + (
                # Session Replay
                "organizations:session-replay",
                "organizations:session-replay-ui",
                "organizations:session-replay-issue-emails",
                "organizations:session-replay-recording-scrubbing",
                "organizations:session-replay-slack-new-issue",
            )
            + (
                # Logs (OurLogs)
                "organizations:ourlogs-enabled",
                "organizations:ourlogs-ingestion",
                "organizations:ourlogs-stats",
                "organizations:ourlogs-replay-ui",
  
                # Chart-only / misc
                "organizations:related-events",
                "organizations:reprocessing-v2",
                "organizations:set-grouping-config",
                "organizations:onboarding",
                "projects:similarity-indexing",
                "projects:similarity-view",
            )
        }
    )
  
    #######################
    # Email Configuration #
    #######################
    SENTRY_OPTIONS['mail.backend'] = os.getenv("SENTRY_EMAIL_BACKEND", "dummy")
    SENTRY_OPTIONS['mail.use-tls'] = bool(strtobool(os.getenv("SENTRY_EMAIL_USE_TLS", "false")))
    SENTRY_OPTIONS['mail.use-ssl'] = bool(strtobool(os.getenv("SENTRY_EMAIL_USE_SSL", "false")))
    SENTRY_OPTIONS['mail.username'] = os.getenv("SENTRY_EMAIL_USERNAME", "")
    SENTRY_OPTIONS['mail.password'] = os.getenv("SENTRY_EMAIL_PASSWORD", "")
    SENTRY_OPTIONS['mail.port'] = int(os.getenv("SENTRY_EMAIL_PORT", "25"))
    SENTRY_OPTIONS['mail.host'] = os.getenv("SENTRY_EMAIL_HOST", "")
    SENTRY_OPTIONS['mail.from'] = os.getenv("SENTRY_EMAIL_FROM", "")
  
    ################
    # File storage #
    ################
    SENTRY_OPTIONS['filestore.backend'] = "filesystem"
    SENTRY_OPTIONS['filestore.options'] = {
        'location': "/var/lib/sentry/files",
    }
  
    ##################
    # Replay Storage #
    ##################
  
    ###################
    # Profiling Store #
    ###################
    # The profiling team has been working on vroomrs, and it's now doing the heavy lifting.
    # The ingest-profiles container now processes profiles immediately via vroomrs and writes
    # them directly to your bucket. This streamlines the pipeline.
    #
    # NOTE: It's recommended to use an object storage backend for profiles storage
    # (for example S3-compatible storage or GCS).
    # While filesystem backend is supported (for sharing PVC between vroom and ingest-profiles),
    # it's not recommended for production use.
    SENTRY_OPTIONS['filestore.profiles-backend'] = "filesystem"
    SENTRY_OPTIONS['filestore.profiles-options'] = {
        'location': "/var/vroom/sentry-profiles",
    }
  
    #########################
    # Bitbucket Integration #
    #########################
  
    # BITBUCKET_CONSUMER_KEY = 'YOUR_BITBUCKET_CONSUMER_KEY'
    # BITBUCKET_CONSUMER_SECRET = 'YOUR_BITBUCKET_CONSUMER_SECRET'
  
    #########
    # Relay #
    #########
    SENTRY_RELAY_WHITELIST_PK = []
    SENTRY_RELAY_OPEN_REGISTRATION = True
  
    #######################
    # OpenAi Suggestions #
    #######################
  
    OPENAI_API_KEY = os.getenv("OPENAI_API_KEY", "")
    if OPENAI_API_KEY:
      SENTRY_FEATURES["organizations:open-ai-suggestion"] = True
    
