apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sentry
  namespace: sentry
resources:
  - prod/sc-local.yaml
  #- prod/cnpg.yaml
  # - prod/ingress.yaml
helmCharts:
  - name: sentry
    version: "29.5.1"
    repo: "https://sentry-kubernetes.github.io/charts"
    releaseName: "sentry"
    namespace: sentry
    valuesFile: "helm/values.yaml"
